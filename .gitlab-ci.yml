stages:
  - lint
  - format
  - type_check
  - test
  - coverage
  - deploy

lint:
  stage: lint
  script: 
    - echo "Running eslint"
    - eslint . || true

format:
  stage: format
  script: 
    - echo "Running prettier"
    - prettier --check . || true

type_check:
  stage: type_check
  script: 
    - echo "Running tsc"
    - tsc --noEmit || true

test:
  stage: test
  script: 
    - echo "Running jest"
    - jest || true

coverage:
  stage: coverage
  script: 
    - echo "Running coverage"
    - jest --coverage || true

pages:
  stage: deploy
  before_script:
    - mkdir -p public
    - cp index.html public/index.html
    - cp -r specs public/specs || true
  script:
    - echo "FlowDesk deployed"
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
