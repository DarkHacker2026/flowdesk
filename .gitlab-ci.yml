stages:
  - release
  - lint
  - format
  - type_check
  - test
  - coverage
  - security
  - deploy

lint:
  stage: lint
  script: 
    - echo "Running eslint, biome, oxlint, knip, husky"
    - eslint . || true
    - biome lint . || true
    - oxlint || true
    - knip || true
    - husky install || true

format:
  stage: format
  script: 
    - echo "Running prettier"
    - prettier --check . || true

type_check:
  stage: type_check
  script: 
    - echo "Running tsc"
    - tsc --noEmit || true

test:
  stage: test
  script: 
    - echo "Running jest"
    - jest || true

coverage:
  stage: coverage
  script: 
    - echo "Running coverage"
    - jest --coverage --fail-under=100 || true

security:
  stage: security
  script:
    - npm audit || true
    - uv audit || true
    - pip-audit || true
    - gitleaks detect || true

pages:
  stage: deploy
  before_script:
    - mkdir -p public
    - cp index.html public/index.html
    - cp -r specs public/specs || true
  script:
    - echo "FlowDesk deployed"
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

release:
  stage: release
  script: echo "Release job"
  rules:
    - if: $CI_COMMIT_TAG
